<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Loom · the icon.

    §24, §25, §28 — this IS the BlankWarp from /kesi's empty state.
    The same visual the user sees when they first open Loom is the
    same visual on the dock and in the browser tab.

    The number of warp threads is not arbitrary. It is exactly EIGHT —
    the count of vertical strokes in the letters L-O-O-M:
        L = 1 vertical
        O = 2 verticals (left + right side of the loop)
        O = 2 verticals
        M = 3 verticals (left post + valley + right post)
        ──────────────────
        8 verticals total

    Likewise, L-O-O-M has 7 horizontal strokes (1 + 2 + 2 + 2). Those
    7 horizontals are NOT drawn here. They are the 7 weft threads the
    user will lay down by using the product. The empty space between
    the warp threads is where the weft will go. The icon is the loom
    AT REST — the moment before weaving — so that every time the user
    presses ⌘/ they are completing the picture the icon promises.

    The name and the icon and the empty state are the same object.
    "Apple 就是苹果" at its deepest layer: the product is named after
    its own shape.

    §31 — this lives in OS-level contexts only (favicon / PWA /
    Apple touch icon). It must never appear inside the product.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="0.55" stop-color="#5e5ce6"/>
      <stop offset="1" stop-color="#bf5af2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Apple squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Apple top-left inner highlight -->
  <ellipse cx="170" cy="120" rx="190" ry="95" fill="#ffffff" opacity="0.20" filter="url(#glow)"/>

  <!-- Eight warp threads · LOOM = 8 verticals + 7 wefts (implied).
       Spaced evenly across 280px (x = 116 → 396, gap 40), centered. -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.82">
    <line x1="116" y1="176" x2="116" y2="336"/>
    <line x1="156" y1="176" x2="156" y2="336"/>
    <line x1="196" y1="176" x2="196" y2="336"/>
    <line x1="236" y1="176" x2="236" y2="336"/>
    <line x1="276" y1="176" x2="276" y2="336"/>
    <line x1="316" y1="176" x2="316" y2="336"/>
    <line x1="356" y1="176" x2="356" y2="336"/>
    <line x1="396" y1="176" x2="396" y2="336"/>
  </g>
</svg>

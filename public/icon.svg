<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Loom · icon v3
    Keep the load-bearing grammar: 8 warp threads only.
    Improve material, tension, and small-size identity.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091120"/>
      <stop offset="0.56" stop-color="#2248b2"/>
      <stop offset="1" stop-color="#7454ef"/>
    </linearGradient>
    <radialGradient id="sheen" cx="36%" cy="24%" r="62%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.36" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="threads" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.2" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="0.78" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#sheen)"/>

  <!--
    8 warps with slight height rhythm:
    center threads are under the strongest tension,
    outer threads ease off slightly.
  -->
  <g stroke="url(#threads)" stroke-linecap="round" fill="none">
    <line x1="160" y1="190" x2="160" y2="322" stroke-width="2.45" opacity="0.74"/>
    <line x1="186" y1="174" x2="186" y2="338" stroke-width="2.55" opacity="0.82"/>
    <line x1="212" y1="158" x2="212" y2="354" stroke-width="2.7" opacity="0.89"/>
    <line x1="238" y1="142" x2="238" y2="370" stroke-width="2.95" opacity="0.97"/>
    <line x1="274" y1="142" x2="274" y2="370" stroke-width="2.95" opacity="0.97"/>
    <line x1="300" y1="158" x2="300" y2="354" stroke-width="2.7" opacity="0.89"/>
    <line x1="326" y1="174" x2="326" y2="338" stroke-width="2.55" opacity="0.82"/>
    <line x1="352" y1="190" x2="352" y2="322" stroke-width="2.45" opacity="0.74"/>
  </g>
</svg>

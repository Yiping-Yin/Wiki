<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Loom · the icon · §32: LOOM = 8 verticals

    Improved: each thread has its own subtle gradient (silk sheen),
    a soft shadow for depth, and slightly varied opacity.
    Threads are taller and better spaced for the squircle.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="0.55" stop-color="#5e5ce6"/>
      <stop offset="1" stop-color="#bf5af2"/>
    </linearGradient>
    <!-- Top-left inner highlight — Apple-style depth -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <!-- Silk thread gradient — bright in the middle, fades at ends -->
    <linearGradient id="silk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="85%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Soft shadow under each thread for depth -->
    <filter id="threadShadow" x="-50%" y="-10%" width="200%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="1" in="blur"/>
    </filter>
  </defs>

  <!-- Apple squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Inner highlight — top-left glow for glass depth -->
  <ellipse cx="180" cy="130" rx="200" ry="100" fill="#ffffff" opacity="0.16" filter="url(#glow)"/>

  <!-- Eight warp threads · LOOM = 8 verticals
       Wider spread (100→412, gap 44.6) and taller (140→372) to use the space better.
       Each thread gets the silk gradient for sheen. -->

  <!-- Shadow layer -->
  <g stroke="rgba(0,0,0,0.25)" stroke-width="3.5" stroke-linecap="round" filter="url(#threadShadow)">
    <line x1="100" y1="140" x2="100" y2="372"/>
    <line x1="144" y1="140" x2="144" y2="372"/>
    <line x1="189" y1="140" x2="189" y2="372"/>
    <line x1="233" y1="140" x2="233" y2="372"/>
    <line x1="278" y1="140" x2="278" y2="372"/>
    <line x1="322" y1="140" x2="322" y2="372"/>
    <line x1="367" y1="140" x2="367" y2="372"/>
    <line x1="412" y1="140" x2="412" y2="372"/>
  </g>

  <!-- Thread layer — silk gradient, slightly varied opacity per thread -->
  <g stroke="url(#silk)" stroke-linecap="round">
    <line x1="100" y1="140" x2="100" y2="372" stroke-width="2.5" opacity="0.75"/>
    <line x1="144" y1="140" x2="144" y2="372" stroke-width="2.8" opacity="0.82"/>
    <line x1="189" y1="140" x2="189" y2="372" stroke-width="2.5" opacity="0.78"/>
    <line x1="233" y1="140" x2="233" y2="372" stroke-width="3.0" opacity="0.85"/>
    <line x1="278" y1="140" x2="278" y2="372" stroke-width="2.5" opacity="0.80"/>
    <line x1="322" y1="140" x2="322" y2="372" stroke-width="2.8" opacity="0.76"/>
    <line x1="367" y1="140" x2="367" y2="372" stroke-width="2.5" opacity="0.83"/>
    <line x1="412" y1="140" x2="412" y2="372" stroke-width="2.8" opacity="0.79"/>
  </g>
</svg>

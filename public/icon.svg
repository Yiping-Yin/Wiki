<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Loom · The Definitive Mark · §32: 8 warps + 7 negative wefts -->
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="0.50" stop-color="#5e5ce6"/>
      <stop offset="1" stop-color="#bf5af2"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.70" stop-color="#000000" stop-opacity="0.20"/>
      <stop offset="0.90" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.70"/>
    </radialGradient>

    <linearGradient id="silk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="0.15" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.50" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.85" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.88"/>
    </linearGradient>

    <linearGradient id="weft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="0.50" stop-color="#000000" stop-opacity="0.14"/>
      <stop offset="0.85" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="clip"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#vignette)"/>

    <!-- 7 Negative Wefts -->
    <rect x="108" y="186" width="296" height="1.5" fill="url(#weft)"/>
    <rect x="108" y="216" width="296" height="1.5" fill="url(#weft)"/>
    <rect x="108" y="246" width="296" height="1.5" fill="url(#weft)"/>
    <rect x="108" y="276" width="296" height="1.5" fill="url(#weft)"/>
    <rect x="108" y="306" width="296" height="1.5" fill="url(#weft)"/>
    <rect x="108" y="336" width="296" height="1.5" fill="url(#weft)"/>
    <rect x="108" y="366" width="296" height="1.5" fill="url(#weft)"/>

    <!-- 8 Warp Threads: full height, top to bottom -->
    <rect x="136" y="0" width="6" height="512" fill="url(#silk)"/>
    <rect x="174" y="0" width="6" height="512" fill="url(#silk)"/>
    <rect x="212" y="0" width="6" height="512" fill="url(#silk)"/>
    <rect x="238" y="0" width="6" height="512" fill="url(#silk)"/>
    <rect x="268" y="0" width="6" height="512" fill="url(#silk)"/>
    <rect x="294" y="0" width="6" height="512" fill="url(#silk)"/>
    <rect x="332" y="0" width="6" height="512" fill="url(#silk)"/>
    <rect x="370" y="0" width="6" height="512" fill="url(#silk)"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Loom · §32: LOOM = 8 verticals
       Clean, crisp, no over-design. Readable at 16px. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="0.55" stop-color="#5e5ce6"/>
      <stop offset="1" stop-color="#bf5af2"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <ellipse cx="180" cy="130" rx="200" ry="100" fill="#ffffff" opacity="0.14" filter="url(#glow)"/>

  <!-- 8 threads · thin, bright, evenly spaced, tall enough to fill the space -->
  <g stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity="0.90">
    <line x1="128" y1="148" x2="128" y2="364"/>
    <line x1="168" y1="148" x2="168" y2="364"/>
    <line x1="208" y1="148" x2="208" y2="364"/>
    <line x1="248" y1="148" x2="248" y2="364"/>
    <line x1="288" y1="148" x2="288" y2="364"/>
    <line x1="328" y1="148" x2="328" y2="364"/>
    <line x1="368" y1="148" x2="368" y2="364"/>
    <line x1="408" y1="148" x2="408" y2="364"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">Loom blueprint board</title>
  <desc id="desc">Loom wordmark presented on a dark blueprint grid board for the about page.</desc>
  <defs>

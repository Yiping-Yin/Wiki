name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Contract tests
        run: npm run test:contracts

      - name: Production build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke test
        run: npm run smoke

  macos-app-smoke:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Verify Loom Xcode project
        run: npm run app:check-project

      - name: Install Loom.app to ~/Applications
        run: npm run app:user

      - name: Smoke installed Loom.app
        run: npm run app:smoke

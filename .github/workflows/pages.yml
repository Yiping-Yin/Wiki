name: Deploy support site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/support.html'
      - 'public/privacy.html'
      - 'public/apple-touch-icon.png'
      - 'public/favicon.ico'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage static support site
        run: |
          mkdir -p _site
          cp public/support.html  _site/support.html
          cp public/privacy.html  _site/privacy.html
          [ -f public/apple-touch-icon.png ] && cp public/apple-touch-icon.png _site/
          [ -f public/favicon.ico ]          && cp public/favicon.ico          _site/
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0;url=support.html">
            <title>Loom · A screen that replaces paper</title>
            <link rel="canonical" href="https://yiping-yin.github.io/Wiki/support.html">
          </head>
          <body>
            <p><a href="support.html">Support</a> · <a href="privacy.html">Privacy</a></p>
          </body>
          </html>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

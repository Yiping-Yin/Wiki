name: Loom
options:
  bundleIdPrefix: com.loom
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"

targets:
  Loom:
    type: application
    platform: macOS
    sources:
      - Sources
      - Assets.xcassets
      - Resources
    settings:
      base:
        PRODUCT_NAME: Loom
        # BUNDLE ID — BEFORE APP STORE SUBMISSION:
        # Change to your personal reverse-DNS prefix (e.g. com.yinyiping.loom).
        # The `com.loom.*` prefix is a placeholder and won't pass review —
        # Apple requires the prefix to match a domain you control, or to
        # simply reverse-DNS your personal handle. See the trademark memo
        # (2026-04-21) — multiple Looms coexist on the App Store; your
        # unique bundle ID + subtitle is what prevents confusion.
        PRODUCT_BUNDLE_IDENTIFIER: com.loom.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Education/Reference per the trademark-check memo (2026-04-21) —
        # helps App Store disambiguation from other "Loom"-named apps in
        # video/productivity categories.
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
        INFOPLIST_KEY_LSApplicationSecondaryCategoryType: "public.app-category.reference"
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026"
        # Short App Store blurb — max 30 chars; shown under app name in
        # search results. Education-category convention is a concise
        # statement of purpose ("A screen that replaces paper.")
        INFOPLIST_KEY_CFBundleGetInfoString: "Loom — a screen that replaces paper"
    info:
      path: Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleName: Loom
        CFBundleDisplayName: Loom
    preBuildScripts:
      - name: Stage Next.js static export into bundle Resources
        # Stages `.next-export/` output into the .app bundle's Resources/web
        # so the loom:// URL scheme handler can serve pre-rendered pages
        # without a running Next.js server. Skips the rebuild when
        # .next-export already exists (callers can run the full export
        # manually via `node scripts/build-static-export.mjs` before
        # kicking off a Release build). Never fails the build — the app
        # still functions in localhost-dev mode without staged content.
        runOnlyWhenInstalling: false
        script: |
          set -eu
          REPO="${PROJECT_DIR}/../.."
          EXPORT="${REPO}/.next-export"
          DEST="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Contents/Resources/web"
          if [ ! -d "$EXPORT" ]; then
            echo "Loom: .next-export/ not found — skipping web bundle stage."
            echo "       Run 'node scripts/build-static-export.mjs' from the repo root"
            echo "       before a Release build to bundle the pre-rendered pages."
            exit 0
          fi
          mkdir -p "$DEST"
          if command -v rsync >/dev/null 2>&1; then
            if ! rsync -a --delete "$EXPORT/" "$DEST/"; then
              echo "Loom: rsync failed — falling back to cp -R"
              rm -rf "$DEST"
              mkdir -p "$DEST"
              cp -R "$EXPORT"/. "$DEST"/
            fi
          else
            rm -rf "$DEST"
            mkdir -p "$DEST"
            cp -R "$EXPORT"/. "$DEST"/
          fi
          echo "Loom: staged $(find "$DEST" -type f | wc -l | tr -d ' ') files to Resources/web"
    entitlements:
      path: Loom.entitlements
      properties:
        # Sandbox stays OFF until Phase 6 ships. Enabling prematurely
        # breaks file access against the user's knowledge folder and
        # any external drives. Flip to `true` only during the App Store
        # submission pass.
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        # Needed for outbound HTTPS (Anthropic / OpenAI / custom endpoints
        # / localhost Ollama). network.server was retained for an earlier
        # architecture that bundled node; the current design doesn't bind
        # any server, but keeping it off-by-default is fine — no listener
        # is created at runtime.
        com.apple.security.files.user-selected.read-write: true

  LoomTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Loom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loom.appTests
        GENERATE_INFOPLIST_FILE: YES
